@if(isAddingTask){
  <app-new-task [userId]="userId" (close)="onCloseAddTask()"/>
}

<section id="tasks">
  <header>
    <h2>{{ name }}'s tasks</h2>
    <menu>
      <button (click)="onStartAddTask()">Add task</button>
    </menu>
  </header>

  <ul>
    @for (userTasks of selectedUserTasks; track userTasks.id) {
      <li>
        <app-task [task]="userTasks" />
      </li>
    }
  </ul>
</section>
